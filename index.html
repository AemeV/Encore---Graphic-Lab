<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encore Graphic Lab</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #3D3D3D;
      color: #E0E0E0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    #root { display: flex; flex-direction: column; height: 100vh; }
    .app  { display: flex; flex-direction: column; height: 100%; }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: #1E1E1E;
      border-bottom: 1px solid #2E2E2E;
      flex-shrink: 0;
      gap: 16px;
    }
    .header-left  { display: flex; align-items: center; gap: 8px; justify-content: flex-start; flex: 1; }
    .header-center{
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; pointer-events: none;
    }
    .header-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; flex: 1; }
    /* En desktop btn-row es invisible: sus hijos fluyen en la fila del header */
    .btn-row { display: contents; }

    .tool-label { font-size: 11px; letter-spacing: .12em; color: #4A4A4A; text-transform: uppercase; padding-right: 2px; }
    .sep        { width: 1px; height: 22px; background: #2E2E2E; margin: 0 4px; }


    .btn {
      padding: 11px 16px;
      border: 1px solid #383838; background: #262626; color: #888;
      border-radius: 5px; font-size: 12px; font-weight: 500;
      letter-spacing: .06em; cursor: pointer;
      transition: all .1s; user-select: none; white-space: nowrap;
    }
    .btn:hover       { background: #303030; border-color: #505050; color: #CCC; }
    .btn.on          { background: #cdff7c; border-color: #cdff7c; color: #1A1A1A; font-weight: 700; }
    .btn.warn:hover  { background: #3A1212; border-color: #7A2A2A; color: #E07070; }
    .btn.accent:hover{ background: #2D2D2D; border-color: #cdff7c; color: #cdff7c; }

    /* ── Panels ──────────────────────────────────────────────── */
    .panels { display: flex; flex: 1; overflow: hidden; }

    .panel {
      position: relative;
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 14px; overflow: hidden;
    }
    .panel.preview { background: #161616; border-left: 1px solid #282828; }
    .panel.hidden  { display: none; }

    .panel-footer {
      height: 62px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 6px; border-top: 1px solid #252525;
    }

    .panel-body {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Editor SVG */
    .grid-svg { width: 100%; height: 100%; max-width: 560px; max-height: 100%; cursor: crosshair; user-select: none; }

    /* Editor / Preview controls live in panel-footer */
    .tab-btn {
      padding: 9px 16px;
      border: 1px solid #282828; background: #1A1A1A; color: #4A4A4A;
      border-radius: 5px; font-size: 12px; font-weight: 500;
      letter-spacing: .06em; cursor: pointer;
      transition: all .1s; user-select: none; white-space: nowrap;
    }
    .tab-btn:hover { border-color: #484848; color: #888; }
    .tab-btn.on    { border-color: #555555; background: #2D2D2D; color: #cdff7c; }
    .zoom-pct      { min-width: 52px; text-align: center; }

    /* Preview disc + logo */
    .preview-stack { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 440px; }
    .preview-disc  { width: 100%; }
    .preview-disc svg { width: 100%; height: auto; display: block; }
    .preview-logo  { width: 100%; }
    .preview-logo svg { width: 100%; height: auto; display: block; }

    .hint { position: absolute; bottom: 10px; left: 14px; font-size: 11px; color: #2E2E2E; letter-spacing: .05em; }

    /* ── Brand Archive ───────────────────────────────────────────── */
    .archive-view {
      flex: 1; overflow-y: auto;
      padding: 48px 56px;
      background: #161616;
    }
    .archive-section { margin-bottom: 60px; }
    .archive-divider { display: flex; align-items: center; gap: 18px; margin-bottom: 32px; }
    .archive-divider-line { flex: 1; height: 1px; background: #252525; }
    .archive-section-title {
      font-size: 10px; letter-spacing: .28em; text-transform: uppercase;
      color: #3A3A3A; white-space: nowrap;
    }
    .archive-cards { display: flex; gap: 16px; align-items: stretch; }
    .archive-card {
      flex: 1; background: #1C1C1C; border: 1px solid #252525;
      border-radius: 10px; padding: 24px 28px 24px;
      display: flex; flex-direction: column; align-items: stretch; gap: 0;
    }
    .archive-card.placeholder {
      border-style: dashed; min-height: 130px;
      align-items: center; justify-content: center;
    }
    .archive-card-label {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: #484848; margin-bottom: 20px; text-align: center;
    }
    .archive-card-preview {
      flex: 1; display: flex; align-items: flex-end;
      padding-bottom: 24px;
    }
    .archive-card-preview svg { width: 100%; height: auto; display: block; }
    .archive-card-dl {
      padding: 8px 18px; background: #222; border: 1px solid #333;
      color: #666; border-radius: 5px; font-size: 11px; font-weight: 500;
      letter-spacing: .05em; cursor: pointer; transition: all .1s;
    }
    .archive-card-dl:hover { background: #2A2A2A; border-color: #cdff7c; color: #cdff7c; }
    .archive-placeholder-text { font-size: 10px; color: #2A2A2A; letter-spacing: .1em; text-transform: uppercase; }

    /* ── Responsive / Mobile (≤ 700px) ──────────────────────────────── */
    @media (max-width: 700px) {

      /* ── Header: logo arriba full-width, luego left y right lado a lado ── */
      .header {
        flex-wrap: wrap;
        align-items: flex-start;
        padding: 10px 14px 0;
        gap: 0;
      }

      /* Franja 1 – logo full-width centrado con margen lateral */
      .header-center {
        position: static; transform: none;
        order: -1; width: 100% !important;
        display: flex; justify-content: center;
        padding: 0 16px 10px;
        pointer-events: none;
      }
      .header-center svg { width: 100%; height: auto; }

      /* Franjas 2 & 3 – izquierda y derecha lado a lado, cada una en 2 filas */
      .header-left {
        flex: 1;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 5px;
        padding: 8px 0 10px;
        border-top: 1px solid #252525;
      }

      .header-right {
        flex: 1;
        flex-direction: column;
        align-items: flex-end;
        justify-content: flex-start;
        gap: 5px;
        padding: 8px 0 10px;
        border-top: 1px solid #252525;
      }

      /* btn-row es una fila real en mobile */
      .btn-row { display: flex; gap: 5px; }

      .sep { display: none; }

      /* ── Paneles: apilados, reparten el alto restante ── */
      .panels { flex-direction: column; }
      .panel  { flex: 1; min-height: 0; }
      .panel.preview { border-left: none; border-top: 1px solid #282828; }

      /* body ocupa el espacio disponible; footer no se encoge nunca */
      .panel-body   { flex: 1; min-height: 0; }
      .panel-footer {
        flex-shrink: 0;
        height: auto; min-height: 48px;
        flex-wrap: wrap; padding: 7px; gap: 5px;
        justify-content: center;
      }

      /* Preview mismo ancho que editor */
      .preview-stack { max-width: none; }

      /* Botones compactos */
      .btn, .tab-btn { padding: 7px 10px; font-size: 11px; }

      /* ── Brand Archive: tarjetas en columna ── */
      .archive-view    { padding: 20px 14px; }
      .archive-cards   { flex-direction: column; }
      .archive-section { margin-bottom: 36px; }
    }
  </style>
</head>

    poly: "226.51 359.43 226.51 440.74 221.22 440.74 216.99 359.43 127.26 359.43 127.26 487.22 180.18 487.22 180.18 405.92 185.48 405.92 189.71 487.22 279.13 487.22 279.13 359.43 226.51 359.43",
  },
];

function downloadImagotipoSVG(imago) {
  let inner = '';
  if (imago.inverted) {
    inner += '<rect width="' + imago.bgW + '" height="' + imago.bgH + '" fill="' + BRAND + '"/>';
    inner += imago.paths.map(function(d) { return '<path d="' + d + '" fill="#303030"/>'; }).join('');
    inner += '<polygon points="' + imago.poly + '" fill="#303030"/>';
  } else {
    inner += imago.paths.map(function(d) { return '<path d="' + d + '" fill="' + BRAND + '"/>'; }).join('');
    inner += '<polygon points="' + imago.poly + '" fill="' + BRAND + '"/>';
  }
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + imago.viewBox + '">' + inner + '</svg>';
  const url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
  const a   = document.createElement('a');
  a.href = url; a.download = 'Encore Imagotipo ' + imago.label + '.svg';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
}

function EncoreLogo({ fill }) {
  return (
    <svg viewBox="0 0 454.7 47.5" fill={fill || 'white'} xmlns="http://www.w3.org/2000/svg">
      {ENCORE_PATHS.map((d, i) => <path key={i} d={d} />)}
      <polygon points={ENCORE_POLY} />
    </svg>
  );
}

// ── Geometry ───────────────────────────────────────────────────────────────────
function arcPath(r, s) {
  const ri = G.ringStart + r * RING_W;
  const ro = ri + RING_W;
  const step = (2 * Math.PI) / G.segments;
  const a0 = -Math.PI / 2 + s * step;
  const a1 = a0 + step;
  const { cx, cy } = G;
  const x1 = cx + ri * Math.cos(a0), y1 = cy + ri * Math.sin(a0);
  const x2 = cx + ro * Math.cos(a0), y2 = cy + ro * Math.sin(a0);
  const x3 = cx + ro * Math.cos(a1), y3 = cy + ro * Math.sin(a1);
  const x4 = cx + ri * Math.cos(a1), y4 = cy + ri * Math.sin(a1);
  return 'M' + x1 + ' ' + y1 + 'L' + x2 + ' ' + y2 +
         'A' + ro + ' ' + ro + ' 0 0 1 ' + x3 + ' ' + y3 +
         'L' + x4 + ' ' + y4 +
         'A' + ri + ' ' + ri + ' 0 0 0 ' + x1 + ' ' + y1 + 'Z';
}

const PATHS = Array.from({ length: G.totalRings }, (_, r) =>
  Array.from({ length: G.segments }, (_, s) => arcPath(r, s))
);

// ── Symmetry helpers ───────────────────────────────────────────────────────────
const SYM_OPTIONS = [1, 2, 4, 8];

function mirroredSegs(s, sym, diagLock) {
  const out = [];
  for (let i = 0; i < sym; i++) {
    const seg = (s + Math.round((G.segments / sym) * i)) % G.segments;
    if (!diagLock || DIAG_SEGS.has(seg)) out.push(seg);
  }
  return out;
}

function applySymmetryToAll(prev, newSym, diagLock) {
  const next = new Set(prev);
  prev.forEach(key => {
    const [r, s] = key.split('-').map(Number);
    for (let i = 1; i < newSym; i++) {
      const seg = (s + Math.round((G.segments / newSym) * i)) % G.segments;
      if (!diagLock || DIAG_SEGS.has(seg)) next.add(r + '-' + seg);
    }
  });
  return next;
}

// ── Preview viewBox + transform ────────────────────────────────────────────────
function previewVB(scaleY) {
  if (scaleY === 1) return '0 0 700 700';
  const top = G.cy - G.outerR * scaleY;
  return '0 ' + top + ' 700 ' + (G.outerR * scaleY * 2);
}
function previewTx(scaleY) {
  if (scaleY === 1) return null;
  return 'translate(' + G.cx + ',' + G.cy + ') scale(1,' + scaleY + ') translate(' + (-G.cx) + ',' + (-G.cy) + ')';
}

// ── Grid SVG ───────────────────────────────────────────────────────────────────
function GridSVG({ filled, diagLock, onDown, onEnter, onUp }) {
  const { cx, cy, holeR, outerR, size, totalRings, segments } = G;
  return (
    <svg className="grid-svg" viewBox={'0 0 ' + size + ' ' + size}
      preserveAspectRatio="xMidYMid meet"
      onMouseUp={onUp} onMouseLeave={onUp}>
      <rect width={size} height={size} fill="#3D3D3D" />
      {Array.from({ length: totalRings }, (_, r) =>
        Array.from({ length: segments }, (_, s) => {
          const key    = r + '-' + s;
          const locked = diagLock && !DIAG_SEGS.has(s);
          const painted = !locked && filled.has(key);
          return (
            <path key={key} d={PATHS[r][s]}
              fill={painted ? BRAND : locked ? FILL_LOCKED : FILL_EMPTY}
              stroke={locked ? LINE_LOCKED : LINE_GRID}
              strokeWidth="0.6"
              onMouseDown={locked ? undefined : () => onDown(r, s)}
              onMouseEnter={locked ? undefined : () => onEnter(r, s)}
              style={{ cursor: locked ? 'default' : 'crosshair' }}
            />
          );
        })
      )}
      {Array.from({ length: totalRings + 1 }, (_, i) => {
        const r = G.ringStart + i * RING_W;
        return <circle key={'ring-' + i} cx={cx} cy={cy} r={r} fill="none" stroke="white" strokeWidth="0.5" opacity="0.18" />;
      })}
      {Array.from({ length: segments }, (_, s) => {
        const angle = -Math.PI / 2 + s * (2 * Math.PI / segments);
        const x1 = cx + G.ringStart * Math.cos(angle);
        const y1 = cy + G.ringStart * Math.sin(angle);
        const x2 = cx + outerR * Math.cos(angle);
        const y2 = cy + outerR * Math.sin(angle);
        return <line key={'rad-' + s} x1={x1} y1={y1} x2={x2} y2={y2} stroke="white" strokeWidth="0.5" opacity="0.18" />;
      })}
      <line x1={cx} y1={0}    x2={cx} y2={size} stroke="white" strokeWidth="0.8" opacity="0.5" />
      <line x1={0}  y1={cy}   x2={size} y2={cy} stroke="white" strokeWidth="0.8" opacity="0.5" />
      <circle cx={cx} cy={cy} r={holeR}     fill="#3D3D3D" stroke={LINE_GRID} strokeWidth="0.8" />
      <circle cx={cx} cy={cy} r={holeR - 6} fill="#2C2C2C" />
      <circle cx={cx} cy={cy} r={outerR - 0.5} fill="none" stroke="#444" strokeWidth="0.8" />
    </svg>
  );
}

// ── Preview SVG ────────────────────────────────────────────────────────────────
function PreviewSVG({ filled, scaleY, showCdBg, diagLock }) {
  const { cx, cy, holeR, outerR } = G;
  const vb = previewVB(scaleY);
  const tx = previewTx(scaleY);

  const filledPaths = [];
  filled.forEach(key => {
    const [r, s] = key.split('-').map(Number);
    if (diagLock && !DIAG_SEGS.has(s)) return;
    filledPaths.push(<path key={key} d={PATHS[r][s]} fill={BRAND} stroke={BRAND} strokeWidth="1.2" />);
  });

  const content = showCdBg ? (
    <React.Fragment>
      <circle cx={cx} cy={cy} r={outerR} fill="#111" />
      {filledPaths}
      <circle cx={cx} cy={cy} r={holeR + 2} fill="#111" />
      <circle cx={cx} cy={cy} r={holeR - 4} fill="#1C1C1C" />
    </React.Fragment>
  ) : (
    <React.Fragment>{filledPaths}</React.Fragment>
  );

  return (
    <svg viewBox={vb} preserveAspectRatio="xMidYMid meet">
      {tx ? <g transform={tx}>{content}</g> : content}
    </svg>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [filled,      setFilled]      = useState(new Set());
  const [symmetry,    setSymmetry]    = useState(1);
  const [diagLock,    setDiagLock]    = useState(false);
  const [prevMode,    setPrevMode]    = useState(0);
  const [showCdBg,    setShowCdBg]    = useState(true);
  const [showLogo,    setShowLogo]    = useState(false);
  const [previewOnly, setPreviewOnly] = useState(false);
  const [zoom,        setZoom]        = useState(1);
  const [showArchive, setShowArchive] = useState(false);

  const drawing        = useRef(false);
  const drawMode       = useRef('fill');
  const strokeSnap     = useRef(null);
  const undoStack      = useRef([]);
  const redoStack      = useRef([]);
  const previewBodyRef = useRef(null);
  const fileInputRef   = useRef(null);
  const exportCountRef = useRef(0);

  // Read export counter from localStorage after mount (safe — won't crash if unavailable)
  useEffect(() => {
    try {
      const n = parseInt(localStorage.getItem('encoreExportNum') || '0');
      if (!isNaN(n)) exportCountRef.current = n;
    } catch (_) {}
  }, []);

  // ── Drawing ──────────────────────────────────────────────────────────────────
  const applyCell = useCallback((r, s, mode, prev) => {
    const next = new Set(prev);
    mirroredSegs(s, symmetry, diagLock).forEach(seg => {
      const k = r + '-' + seg;
      if (mode === 'fill') next.add(k); else next.delete(k);
    });
    return next;
  }, [symmetry, diagLock]);

  const handleDown = useCallback((r, s) => {
    if (drawing.current) return;
    drawing.current = true;
    setFilled(prev => {
      strokeSnap.current = new Set(prev);
      redoStack.current  = [];
      drawMode.current   = prev.has(r + '-' + s) ? 'erase' : 'fill';
      return applyCell(r, s, drawMode.current, prev);
    });
  }, [applyCell]);

  const handleEnter = useCallback((r, s) => {
    if (!drawing.current) return;
    setFilled(prev => applyCell(r, s, drawMode.current, prev));
  }, [applyCell]);

  const handleUp = useCallback(() => {
    if (!drawing.current) return;
    drawing.current = false;
    if (strokeSnap.current !== null) {
      undoStack.current.push(strokeSnap.current);
      if (undoStack.current.length > 60) undoStack.current.shift();
      strokeSnap.current = null;
    }
  }, []);

  // ── Rotate 90° ───────────────────────────────────────────────────────────────
  const rotate90 = useCallback(() => {
    const step = G.segments / 4;
    setFilled(prev => {
      undoStack.current.push(new Set(prev));
      redoStack.current = [];
      const next = new Set();
      prev.forEach(key => {
        const [r, s] = key.split('-').map(Number);
        next.add(r + '-' + ((s + step) % G.segments));
      });
      return next;
    });
  }, []);

  // ── Random generation ────────────────────────────────────────────────────
  const generateRandom = useCallback(() => {
    const next = new Set();
    const availSegs = diagLock ? Array.from(DIAG_SEGS) : Array.from({ length: G.segments }, (_, i) => i);
    const numBolts = 3 + Math.floor(Math.random() * 5);
    for (let b = 0; b < numBolts; b++) {
      let seg = availSegs[Math.floor(Math.random() * availSegs.length)];
      const startR = Math.floor(Math.random() * 3);
      const endR   = G.totalRings - 1 - Math.floor(Math.random() * 2);
      for (let r = startR; r <= endR; r++) {
        if (Math.random() > 0.12) {
          const s = ((seg % G.segments) + G.segments) % G.segments;
          if (!diagLock || DIAG_SEGS.has(s)) next.add(r + '-' + s);
          if (Math.random() < 0.35) {
            const sn = (s + 1) % G.segments;
            if (!diagLock || DIAG_SEGS.has(sn)) next.add(r + '-' + sn);
          }
        }
        const drift = Math.random();
        if (drift < 0.35) seg -= 1;
        else if (drift < 0.60) seg += 1;
      }
    }
    const withSym = applySymmetryToAll(next, symmetry, diagLock);
    setFilled(prev => { undoStack.current.push(new Set(prev)); redoStack.current = []; return withSym; });
  }, [symmetry, diagLock]);

  // ── Symmetry ─────────────────────────────────────────────────────────────────
  const changeSymmetry = useCallback((newSym) => {
    setFilled(prev => {
      undoStack.current.push(new Set(prev));
      redoStack.current = [];
      return applySymmetryToAll(prev, newSym, diagLock);
    });
    setSymmetry(newSym);
  }, [diagLock]);

  // ── Undo / Redo / Clear ───────────────────────────────────────────────────────
  const undo = useCallback(() => {
    if (!undoStack.current.length) return;
    setFilled(prev => { redoStack.current.push(new Set(prev)); return undoStack.current.pop(); });
  }, []);

  const redo = useCallback(() => {
    if (!redoStack.current.length) return;
    setFilled(prev => { undoStack.current.push(new Set(prev)); return redoStack.current.pop(); });
  }, []);

  const clear = useCallback(() => {
    setFilled(prev => { undoStack.current.push(new Set(prev)); redoStack.current = []; return new Set(); });
  }, []);

  // ── Save / Load ───────────────────────────────────────────────────────────────
  const saveDesign = useCallback(() => {
    const data = JSON.stringify({ v: 1, cells: Array.from(filled) });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([data], { type: 'application/json' })),
      download: 'isotipo.json',
    });
    a.click();
    URL.revokeObjectURL(a.href);
  }, [filled]);

  const loadDesign = useCallback(e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (Array.isArray(data.cells)) {
          setFilled(prev => {
            undoStack.current.push(new Set(prev));
            redoStack.current = [];
            return new Set(data.cells);
          });
        }
      } catch (_) {}
      e.target.value = '';
    };
    reader.readAsText(file);
  }, []);

  // ── Export SVG (3 views) ──────────────────────────────────────────────────────
  const exportSVG = useCallback(() => {
    const { cx, cy, holeR, outerR } = G;
    exportCountRef.current += 1;
    try { localStorage.setItem('encoreExportNum', String(exportCountRef.current)); } catch (_) {}
    const num = String(exportCountRef.current).padStart(2, '0');

    const cellPaths = Array.from(filled).map(k => {
      const [r, s] = k.split('-').map(Number);
      return '<path d="' + PATHS[r][s] + '" fill="' + BRAND + '"/>';
    }).join('');

    const bg = '<circle cx="' + cx + '" cy="' + cy + '" r="' + outerR + '" fill="#111"/>';
    const hole = '<circle cx="' + cx + '" cy="' + cy + '" r="' + holeR + '" fill="#111"/>';

    const views = [
      { label: '1x1', vb: '0 0 700 700', tx: null },
      { label: '400', vb: '0 210 700 280',
        tx: 'translate(' + cx + ',' + cy + ') scale(1,0.4) translate(' + (-cx) + ',' + (-cy) + ')' },
      { label: '200', vb: '0 280 700 140',
        tx: 'translate(' + cx + ',' + cy + ') scale(1,0.2) translate(' + (-cx) + ',' + (-cy) + ')' },
    ];

    views.forEach(({ label, vb, tx }, i) => {
      const inner = bg + cellPaths + hole;
      const body  = tx ? '<g transform="' + tx + '">' + inner + '</g>' : inner;
      const svg   = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + vb + '">' + body + '</svg>';
      setTimeout(() => {
        const url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Encore Graphic Lab - ' + num + ' [' + label + '].svg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }, i * 500);
    });
  }, [filled]);

  // ── Keyboard shortcuts ────────────────────────────────────────────────────────
  useEffect(() => {
    const fn = e => {
      if (e.target.tagName === 'INPUT') return;
      if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
      if ((e.metaKey || e.ctrlKey) && ((e.shiftKey && e.key === 'z') || e.key === 'y')) { e.preventDefault(); redo(); }
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [undo, redo]);

  useEffect(() => {
    window.addEventListener('mouseup', handleUp);
    return () => window.removeEventListener('mouseup', handleUp);
  }, [handleUp]);

  // Scroll-wheel zoom (passive: false so preventDefault works)
  useEffect(() => {
    const el = previewBodyRef.current;
    if (!el) return;
    const fn = e => {
      e.preventDefault();
      setZoom(z => parseFloat(Math.max(0.3, Math.min(4, z + (e.deltaY < 0 ? 0.1 : -0.1))).toFixed(2)));
    };
    el.addEventListener('wheel', fn, { passive: false });
    return () => el.removeEventListener('wheel', fn);
  }, []);

  const { scaleY } = PREV_MODES[prevMode];
  const zoomPct    = Math.round(zoom * 100);

  return (
    <div className="app">

      {/* ── Header ──────────────────────────────────────────────────────────── */}
      <header className="header">

        {/* LEFT */}
        <div className="header-left">
          <div className="btn-row">
            <button className="btn" onClick={undo} title="Deshacer ⌘Z">↩</button>
            <button className="btn" onClick={redo} title="Rehacer ⌘⇧Z">↪</button>
            <button className="btn warn" onClick={clear}>Limpiar</button>
          </div>
          <div className="btn-row">
            <input ref={fileInputRef} type="file" accept=".json" style={{ display: 'none' }} onChange={loadDesign} />
            <button className="btn" onClick={() => fileInputRef.current && fileInputRef.current.click()}>Abrir</button>
            <button className="btn" onClick={saveDesign}>Guardar</button>
          </div>
        </div>

        {/* CENTER */}
        <div className="header-center" style={{ width: 260, opacity: 0.9 }}>
          <EncoreLogo fill="white" />
        </div>

        {/* RIGHT */}
        <div className="header-right">
          <div className="btn-row">
            <button className={'btn' + (showArchive ? ' on' : '')}
              onClick={() => setShowArchive(v => !v)}>
              Brand Archive
            </button>
          </div>
          <div className="btn-row">
            <button className="btn accent" onClick={exportSVG}>Exportar</button>
            <button className={'btn' + (previewOnly ? ' on' : '')}
              onClick={() => setPreviewOnly(v => !v)}>
              {previewOnly ? 'Editor' : 'Preview'}
            </button>
          </div>
        </div>

      </header>

      {/* ── Brand Archive ───────────────────────────────────────────────────── */}
      {showArchive && (
        <div className="archive-view">

          {['Isotipo', 'Logotipo', 'Imagotipo'].map(function(section) { return (
            <div key={section} className="archive-section">
              <div className="archive-divider">
                <div className="archive-divider-line" />
                <span className="archive-section-title">{section}</span>
                <div className="archive-divider-line" />
              </div>
              <div className="archive-cards">
                {section === 'Isotipo' ? (
                  ISOTIPO_VERSIONS.map(function(iso) { return (
                    <div key={iso.id} className="archive-card">
                      <span className="archive-card-label">{iso.label}</span>
                      <div className="archive-card-preview">
                        <svg viewBox={iso.viewBox} xmlns="http://www.w3.org/2000/svg">
                          {iso.paths.map(function(d, i) { return <path key={i} d={d} fill={BRAND} />; })}
                        </svg>
                      </div>
                      <button className="archive-card-dl" onClick={function() { downloadIsotipoSVG(iso); }}>
                        Descargar SVG
                      </button>
                    </div>
                  ); })
                ) : section === 'Logotipo' ? (
                  LOGOTIPO_VERSIONS.map(function(logo) { return (
                    <div key={logo.id} className="archive-card">
                      <span className="archive-card-label">{logo.label}</span>
                      <div className="archive-card-preview">
                        <svg viewBox={logo.viewBox} xmlns="http://www.w3.org/2000/svg">
                          {logo.d.map(function(d, i) { return <path key={i} d={d} fill={BRAND} />; })}
                          <polygon points={logo.poly} fill={BRAND} />
                        </svg>
                      </div>
                      <button className="archive-card-dl" onClick={function() { downloadLogoSVG(logo); }}>
                        Descargar SVG
                      </button>
                    </div>
                  ); })
                ) : (
                  IMAGOTIPO_VERSIONS.map(function(imago) { return (
                    <div key={imago.id} className="archive-card">
                      <span className="archive-card-label">{imago.label}</span>
                      <div className="archive-card-preview">
                        <svg viewBox={imago.viewBox} xmlns="http://www.w3.org/2000/svg">
                          {imago.inverted && <rect width={imago.bgW} height={imago.bgH} fill={BRAND} />}
                          {imago.paths.map(function(d, i) { return <path key={i} d={d} fill={imago.inverted ? '#303030' : BRAND} />; })}
                          <polygon points={imago.poly} fill={imago.inverted ? '#303030' : BRAND} />
                        </svg>
                      </div>
                      <button className="archive-card-dl" onClick={function() { downloadImagotipoSVG(imago); }}>
                        Descargar SVG
                      </button>
                    </div>
                  ); })
                )}
              </div>
            </div>
          ); })}

        </div>
      )}

      {/* ── Panels ──────────────────────────────────────────────────────────── */}
      {!showArchive && <div className="panels">

        {/* Editor */}
        <div className={'panel' + (previewOnly ? ' hidden' : '')}>
          <div className="panel-body">
            <GridSVG filled={filled} diagLock={diagLock}
              onDown={handleDown} onEnter={handleEnter} onUp={handleUp} />
          </div>
          <div className="panel-footer">
            <span className="tool-label">Sim</span>
            {SYM_OPTIONS.map(v => (
              <button key={v} className={'btn' + (symmetry === v ? ' on' : '')}
                onClick={() => changeSymmetry(v)} title={'Simetría ' + v + '×'}>
                {v}×
              </button>
            ))}
            <div className="sep" />
            <button className={'btn' + (diagLock ? ' on' : '')}
              onClick={() => setDiagLock(d => !d)} title="Solo zonas diagonales">
              ⬡ Diagonal
            </button>
            <div className="sep" />
            <button className="btn" onClick={rotate90} title="Rotar 90° horario">↻ 90°</button>
            <div className="sep" />
            <button className="btn" onClick={generateRandom} title="Generar patrón aleatorio">LOUD</button>
          </div>
        </div>

        {/* Preview */}
        <div className="panel preview">
          <div className="panel-body" ref={previewBodyRef}>
            <div className="preview-stack" style={{ transform: 'scale(' + zoom + ')', transformOrigin: 'center center' }}>
              <div className="preview-disc">
                <PreviewSVG filled={filled} scaleY={scaleY} showCdBg={showCdBg} diagLock={diagLock} />
              </div>
              {showLogo && (
                <div className="preview-logo">
                  <EncoreLogo fill={BRAND} />
                </div>
              )}
            </div>
          </div>
          <div className="panel-footer">
            {PREV_MODES.map((m, i) => (
              <button key={i} className={'tab-btn' + (prevMode === i ? ' on' : '')}
                onClick={() => setPrevMode(i)}>{m.label}</button>
            ))}
            <div className="sep" />
            <button className={'tab-btn' + (showCdBg ? ' on' : '')}
              onClick={() => setShowCdBg(v => !v)} title="Fondo CD">◉ CD</button>
            <button className={'tab-btn' + (showLogo ? ' on' : '')}
              onClick={() => setShowLogo(v => !v)} title="Logotipo Encore">≡ Logo</button>
            <div className="sep" />
            <button className="tab-btn" onClick={() => setZoom(z => parseFloat(Math.max(0.3, z - 0.25).toFixed(2)))}>−</button>
            <button className="tab-btn zoom-pct" onClick={() => setZoom(1)}>{zoomPct}%</button>
            <button className="tab-btn" onClick={() => setZoom(z => parseFloat(Math.min(4, z + 0.25).toFixed(2)))}>+</button>
          </div>
        </div>

      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
